<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllahiCan - Excellence in Identity</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <header>
        <h1>ALLAHICAN</h1>
        <p>Premium Muslim-American Apparel & Goods</p>
        <div id="cart-container" style="position: absolute; right: 2rem; top: 1.5rem;">
            🛒 <span id="cart-count">0</span>
        </div>
    </header>

    <main class="product-grid">
        <!-- Basic Tee -->
        <article class="product-card" data-product="tee">
            <img src="https://files.cdn.printful.com/files/a82/a82250a249cf968e5c826cda7bde8f5c_preview.png" alt="AllahiCan Basic Tee" class="product-image">
            <h2>AllahiCan Basic Tee</h2>
            <p class="price">0.00</p>
            <div class="actions">
                <select>
                    <option value="S">Small</option>
                    <option value="M">Medium</option>
                    <option value="L">Large</option>
                </select>
                <button class="buy-button">ADD TO CART</button>
            </div>
        </article>

        <!-- Black Tank -->
        <article class="product-card" data-product="tank">
            <img src="https://files.cdn.printful.com/files/9e1/9e133533eabc4181213fcea3e7540bfe_preview.png" alt="AllahiCan Black Tank" class="product-image">
            <h2>AllahiCan Black Tank</h2>
            <p class="price">7.00</p>
            <div class="actions">
                <select>
                    <option value="S">Small</option>
                    <option value="M">Medium</option>
                    <option value="L">Large</option>
                </select>
                <button class="buy-button">ADD TO CART</button>
            </div>
        </article>

        <!-- Prayer Mat -->
        <article class="product-card" data-product="mat">
            <img src="https://files.cdn.printful.com/files/a82/a82250a249cf968e5c826cda7bde8f5c_preview.png" alt="AllahiCan Prayer Mat" class="product-image">
            <h2>AllahiCan Prayer Mat</h2>
            <p class="price">5.00</p>
            <div class="actions">
                <button class="buy-button">ADD TO CART</button>
            </div>
        </article>
    </main>

    <footer>
        <p>© 2026 AllahiCan - Excellence in Identity. Printed on demand.</p>
    </footer>

    <script type="module" src="src/main.js"></script>
</body>
</html>
